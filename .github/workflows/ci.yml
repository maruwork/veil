name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install pytest

      - name: Syntax check
        run: python -m py_compile shared/tools/veil_rule_store.py shared/tools/veil_locale.py shared/tools/veil-db.py shared/tools/veil-profile-audit.py shared/tools/veil-profile-export.py shared/runtime/veil-sync.py shared/runtime/veil-lint.py shared/runtime/veil-normalize.py shared/runtime/veil-status.py

      - name: pytest
        run: python -m pytest tests/ -q

      - name: init-db
        run: python shared/tools/veil-db.py init-db --db /tmp/veil_test.db

      - name: upsert-rule
        run: |
          python shared/tools/veil-db.py upsert-rule \
            --db /tmp/veil_test.db \
            --term "current state" \
            --preferred "present state" \
            --preferred-alt-2 "current status"

      - name: export-mirror
        run: python shared/tools/veil-db.py export-mirror --db /tmp/veil_test.db --rules-dir /tmp/veil_rules_test

      - name: export-html
        run: python shared/tools/veil-db.py export-html --db /tmp/veil_test.db

      - name: lint hit
        run: |
          python shared/runtime/veil-lint.py \
            --db /tmp/veil_test.db \
            --text "The current state of the system" \
            --json > /tmp/lint_hit.json || true
          python -c "import json,sys; r=json.load(open(sys.argv[1])); assert r['violations'], 'expected violation not found'" /tmp/lint_hit.json

      - name: lint clean
        run: |
          python shared/runtime/veil-lint.py \
            --db /tmp/veil_test.db \
            --text "The present state of the system" \
            --json > /tmp/lint_clean.json || true
          python -c "import json,sys; r=json.load(open(sys.argv[1])); assert not r['violations'], 'unexpected violation'" /tmp/lint_clean.json

      - name: normalize
        run: |
          python shared/runtime/veil-normalize.py \
            --db /tmp/veil_test.db \
            --text "current states"

      - name: sync and purge
        run: |
          echo "# test" > /tmp/veil_purge_target.md
          python shared/runtime/veil-sync.py \
            --db /tmp/veil_test.db \
            --rules-dir /tmp/veil_rules_test \
            --add /tmp/veil_purge_target.md
          grep -q "VEIL_START" /tmp/veil_purge_target.md
          python shared/runtime/veil-sync.py \
            --db /tmp/veil_test.db \
            --rules-dir /tmp/veil_rules_test \
            --remove /tmp/veil_purge_target.md --purge
          ! grep -q "VEIL_START" /tmp/veil_purge_target.md

      - name: behavior.md injection
        run: |
          mkdir -p ~/.veil
          echo "Test behavior rule." > ~/.veil/behavior.md
          echo "# target" > /tmp/veil_behavior_target.md
          python shared/runtime/veil-sync.py \
            --db /tmp/veil_test.db \
            --rules-dir /tmp/veil_rules_test \
            --add /tmp/veil_behavior_target.md
          grep -q "Test behavior rule" /tmp/veil_behavior_target.md
          rm ~/.veil/behavior.md

      - name: version
        run: python shared/runtime/veil-status.py --version

  windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest

      - name: Syntax check
        run: python -m py_compile shared/tools/veil_rule_store.py shared/tools/veil_locale.py shared/tools/veil-db.py shared/tools/veil-profile-audit.py shared/tools/veil-profile-export.py shared/runtime/veil-sync.py shared/runtime/veil-lint.py shared/runtime/veil-normalize.py shared/runtime/veil-status.py

      - name: pytest
        run: python -m pytest tests/ -q

      - name: init-db
        shell: bash
        run: python shared/tools/veil-db.py init-db --db "$RUNNER_TEMP/veil_test.db"

      - name: upsert-rule
        shell: bash
        run: |
          python shared/tools/veil-db.py upsert-rule \
            --db "$RUNNER_TEMP/veil_test.db" \
            --term "current state" \
            --preferred "present state" \
            --preferred-alt-2 "current status"

      - name: export-mirror
        shell: bash
        run: python shared/tools/veil-db.py export-mirror --db "$RUNNER_TEMP/veil_test.db" --rules-dir "$RUNNER_TEMP/veil_rules_test"

      - name: export-html
        shell: bash
        run: python shared/tools/veil-db.py export-html --db "$RUNNER_TEMP/veil_test.db"

      - name: lint hit
        shell: bash
        run: |
          python shared/runtime/veil-lint.py \
            --db "$RUNNER_TEMP/veil_test.db" \
            --text "The current state of the system" \
            --json > "$RUNNER_TEMP/lint_hit.json" || true
          python -c "import json,sys; r=json.load(open(sys.argv[1])); assert r['violations'], 'expected violation not found'" "$RUNNER_TEMP/lint_hit.json"

      - name: lint clean
        shell: bash
        run: |
          python shared/runtime/veil-lint.py \
            --db "$RUNNER_TEMP/veil_test.db" \
            --text "The present state of the system" \
            --json > "$RUNNER_TEMP/lint_clean.json" || true
          python -c "import json,sys; r=json.load(open(sys.argv[1])); assert not r['violations'], 'unexpected violation'" "$RUNNER_TEMP/lint_clean.json"

      - name: normalize
        shell: bash
        run: |
          python shared/runtime/veil-normalize.py \
            --db "$RUNNER_TEMP/veil_test.db" \
            --text "current states"

      - name: sync and purge
        shell: bash
        run: |
          echo "# test" > "$RUNNER_TEMP/veil_purge_target.md"
          python shared/runtime/veil-sync.py \
            --db "$RUNNER_TEMP/veil_test.db" \
            --rules-dir "$RUNNER_TEMP/veil_rules_test" \
            --add "$RUNNER_TEMP/veil_purge_target.md"
          grep -q "VEIL_START" "$RUNNER_TEMP/veil_purge_target.md"
          python shared/runtime/veil-sync.py \
            --db "$RUNNER_TEMP/veil_test.db" \
            --rules-dir "$RUNNER_TEMP/veil_rules_test" \
            --remove "$RUNNER_TEMP/veil_purge_target.md" --purge
          ! grep -q "VEIL_START" "$RUNNER_TEMP/veil_purge_target.md"

      - name: behavior.md injection
        shell: bash
        run: |
          mkdir -p ~/.veil
          echo "Test behavior rule." > ~/.veil/behavior.md
          echo "# target" > "$RUNNER_TEMP/veil_behavior_target.md"
          python shared/runtime/veil-sync.py \
            --db "$RUNNER_TEMP/veil_test.db" \
            --rules-dir "$RUNNER_TEMP/veil_rules_test" \
            --add "$RUNNER_TEMP/veil_behavior_target.md"
          grep -q "Test behavior rule" "$RUNNER_TEMP/veil_behavior_target.md"
          rm ~/.veil/behavior.md

      - name: version
        shell: bash
        run: python shared/runtime/veil-status.py --version
