<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VEIL</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <b>VEIL</b>
  <span id="header-subtitle"></span>
<a href="/manual" target="_blank" class="header-link">Manual</a>
</header>

<div class="main">
  <div class="input-area">
    <textarea id="inp" placeholder="" spellcheck="false"></textarea>
  </div>
  <div class="col-headers">
    <div class="col-hd" id="col-hd-in"></div>
    <div class="col-hd" id="col-hd-out"> <span id="rep-count" style="color:#555;"></span></div>
  </div>
  <div class="compare-wrap" id="compare"></div>
</div>

<div class="side">
  <div>
    <div class="lbl" id="lbl-add"></div>
    <input type="text" id="orig" placeholder="">
    <input type="text" id="pref1" placeholder="">
    <input type="text" id="pref2" placeholder="">
    <input type="text" id="pref3" placeholder="">
    <select id="cat">
      <option value="1"></option>
      <option value="5"></option>
      <option value="6"></option>
      <option value="7"></option>
    </select>
    <button id="btn-add" onclick="addVocabForm()" style="width:100%;margin-top:2px;"></button>
  </div>

  <hr>

  <div id="unmatched-section" style="display:none;">
    <div class="lbl-row">
      <div class="lbl" id="lbl-unmatched"> <span id="unmatched-cnt" style="color:#555;"></span></div>
    </div>
    <div id="unmatched-list" class="unmatched-list"></div>
  </div>
  <hr id="hr-unmatched" style="display:none;">

  <div class="lbl-row">
    <div class="lbl" id="lbl-vocab"> <span id="cnt" style="color:#555;"></span></div>
    <div class="lbl-actions">
      <button class="btn-icon" id="btn-sort" onclick="toggleSort()"></button>
      <button class="btn-icon" onclick="exportVocab()" title="Export JSON">↓</button>
      <button class="btn-icon" onclick="importVocab()" title="Import JSON">↑</button>
    </div>
  </div>
  <select id="cat-filter" onchange="onCatFilter(this.value)">
    <option value="0"></option>
    <option value="1"></option>
    <option value="5"></option>
    <option value="6"></option>
    <option value="7"></option>
    <option value="-1"></option>
  </select>
  <input type="file" id="import-file" accept=".json" hidden onchange="handleImportFile(event)">
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="" oninput="onSearch(event)">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
  </div>
  <div class="vlist" id="vlist"></div>
</div>

<footer>
  <button class="btn-p" id="btn-convert" onclick="convert()"></button>
  <button id="btn-add-footer" onclick="addVocabForm()"></button>
  <span id="summary"></span>
  <span style="flex:1"></span>
</footer>

<div id="popup">
  <div class="pop-orig" id="pop-orig"></div>
  <div class="pop-title" id="pop-title"></div>
  <div id="pop-items"></div>
  <hr class="pop-sep">
  <div class="pop-item" onclick="popRevert()"><span id="pop-revert-text" style="color:#777;"></span></div>
  <div class="pop-item" onclick="popExclude()"><span id="pop-exclude-text" style="color:#555;"></span></div>
</div>

<div id="toast"></div>

<div id="quick-add">
  <span class="qa-word"></span>
  <button id="btn-quick-add" onclick="quickAddToForm()"></button>
</div>

<script src="locales.js"></script>
<script src="js/state.js"></script>
<script src="js/api.js"></script>
<script src="js/convert.js"></script>
<script src="js/render.js"></script>
<script src="js/ui.js"></script>
<script src="main.js"></script>
</body>
</html>
